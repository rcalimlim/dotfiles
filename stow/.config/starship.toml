# Starship prompt config
# Docs: https://starship.rs/config/

[git_status]
format = "($all_status$ahead_behind )"
stashed = " $$${count}"
conflicted = " =${count}"
untracked = " ?${count}"
modified = " !${count}"
staged = " +${count}"
renamed = " »${count}"
deleted = " ✘${count}"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇡${ahead_count} ⇣${behind_count}"
